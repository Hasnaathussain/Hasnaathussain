name: GitHub Metrics

on:
  # Schedule updates daily at midnight
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to master
  push:
    branches:
      - master
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub Metrics Infographic
        uses: lowlighter/metrics@latest
        with:
          # You will need to create a Personal Access Token (PAT) with appropriate scopes
          # (repo, read:user, read:org) and save it as METRICS_TOKEN in your repo secrets.
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: Hasnaathussain
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          
          # 3D Isometric Calendar Plugin
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Achievements/Badges Plugin (Disabled due to GraphQL 502 timeouts)
          plugin_achievements: no
          
          # Notable OSS Contributions Plugin (Disabled due to GitHub Projects Classic deprecation warnings)
          plugin_notable: no
          
          # Languages Plugin (Deep analysis)
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_indepth: yes
          plugin_languages_details: percentage, lines
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          
          # Coding Habits Plugin (Disabled due to upstream library TypeError: Cannot destructure property 'author')
          plugin_habits: no
          
          # Lines of Code Plugin
          plugin_lines: yes
          
          # Follow-up Plugin (Status of issues/PRs)
          plugin_followup: yes
          plugin_followup_sections: user
